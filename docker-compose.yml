version: '3.8'

services:
  app:
    build: .
    volumes:
      - ./data:/app/data  # <--- MAPS YOUR PC FOLDER TO THE CONTAINER
      - ./logs:/app/logs  # <--- SAVES LOGS TO YOUR PC
    environment:
      - HUBSPOT_API_KEY=${HUBSPOT_API_KEY}

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data # <--- PERSISTS REDIS QUEUE

  # 2. Il Backend API
  backend:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --reload
    volumes:
      - .:/code  # Modifica codice in tempo reale
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  # 3. Il Worker Celery (che fa il lavoro sporco)
  worker:
    build: .
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    volumes:
      - .:/code
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis